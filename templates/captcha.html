<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Security Verification</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

<style>
  body {
    margin: 0;
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Inter', sans-serif;
    background: radial-gradient(circle at top, #f5f5f7, #d1d1d6);
    color: #1d1d1f;
  }

  .card {
    width: 360px;
    padding: 30px;
    border-radius: 20px;
    background: rgba(255,255,255,0.65);
    backdrop-filter: blur(20px);
    box-shadow: 0 20px 40px rgba(0,0,0,0.08);
    text-align: center;
  }

  h1 {
    font-size: 22px;
    font-weight: 500;
    margin-bottom: 10px;
  }

  p {
    font-size: 14px;
    color: #6e6e73;
    margin-bottom: 20px;
  }

  #captcha-container {
    font-size: 28px;
    letter-spacing: 6px;
    padding: 16px;
    border-radius: 14px;
    background: rgba(0,0,0,0.04);
    margin-bottom: 18px;
    font-weight: 500;
  }

  input {
    width: 100%;
    padding: 12px;
    border-radius: 12px;
    border: 1px solid rgba(0,0,0,0.12);
    margin-bottom: 12px;
    outline: none;
  }

  input:focus {
    border-color: #0071e3;
    box-shadow: 0 0 0 4px rgba(0,113,227,0.15);
  }

  button {
    width: 100%;
    padding: 12px;
    border: none;
    border-radius: 12px;
    background: #0071e3;
    color: white;
    font-weight: 500;
    cursor: pointer;
  }

  button:hover {
    background: #005bb5;
  }

  .error {
    color: #d70015;
    font-size: 13px;
    margin-top: 10px;
  }

  /* honeypot hidden field */
  .hp {
    display: none;
  }
</style>
</head>

<body>

<div class="card">
  <h1>Security Verification</h1>
  <p>Confirm you are human</p>

  <div id="captcha-container">{{ code }}</div>

  <form method="POST">
    <input type="text" name="code" placeholder="Enter code" required>

    <!-- Honeypot (bots will fill this) -->
    <input class="hp" type="text" name="email_confirm" autocomplete="off">

    <input type="hidden" name="token" value="{{ token }}">

    <button type="submit">Continue</button>

    {% if error %}
      <div class="error">Incorrect or expired code. Try again.</div>
    {% endif %}
  </form>
</div>

</body>
</html>
